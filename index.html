function isConfigured(){
  return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId && FIREBASE_CONFIG.authDomain);
}

/* Charge dynamiquement les modules Firebase (ESM via CDN).
   En cas d'échec (réseau, blocage), on reste en mode local : jamais d'écran noir. */
function initFirebase(){
  return new Promise(function(resolve){
    if(!isConfigured()){ FB.mode="local"; return resolve(false); }
    var timeout = setTimeout(function(){ FB.mode="local"; resolve(false); }, 8000);
    var s=document.createElement("script");
    s.type="module";
    s.textContent=`
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, getDoc, setDoc }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
      try{
        const app = initializeApp(window.FIREBASE_CONFIG);
        window.__fb = {
          app,
          auth: getAuth(app),
          db: getFirestore(app),
          GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult,
          signOut, onAuthStateChanged, doc, getDoc, setDoc
        };
        window.dispatchEvent(new Event("fb-ready"));
      }catch(e){
        console.error("Firebase init error", e);
        window.dispatchEvent(new Event("fb-failed"));
      }
    `;
    window.FIREBASE_CONFIG = FIREBASE_CONFIG;
    window.addEventListener("fb-ready", function(){
      clearTimeout(timeout);
      FB.ready=true; FB.auth=window.__fb.auth; FB.db=window.__fb.db; FB.mode="cloud";
      resolve(true);
    }, {once:true});
    window.addEventListener("fb-failed", function(){
      clearTimeout(timeout); FB.mode="local"; resolve(false);
    }, {once:true});
    s.onerror=function(){ clearTimeout(timeout); FB.mode="local"; resolve(false); };
    document.head.appendChild(s);
  });
}

function fbSignIn(){
  if(!FB.ready) return;
  var f=window.__fb;
  var provider=new f.GoogleAuthProvider();
  f.signInWithPopup(f.auth, provider).catch(function(err){
    // Sur mobile, les popups sont souvent bloqués → bascule sur redirection
    if(err && (err.code==="auth/popup-blocked" || err.code==="auth/popup-closed-by-user" || err.code==="auth/cancelled-popup-request")){
      f.signInWithRedirect(f.auth, provider);
    } else {
      toast("Connexion impossible : " + (err && err.code ? err.code : "erreur"));
    }
  });
}

function fbSignOut(){
  if(!FB.ready) return;
  window.__fb.signOut(window.__fb.auth).then(function(){
    LOGS={}; FB.user=null; render();
  });
}

/* Charge les données du compte connecté */
function cloudLoad(uid){
  var f=window.__fb;
  return f.getDoc(f.doc(f.db,"users",uid)).then(function(snap){
    if(snap.exists()){
      var d=snap.data();
      return d && d.logs ? d.logs : {};
    }
    return null; // aucun document → compte neuf
  });
}

/* Sauvegarde (avec anti-rafale : on groupe les écritures) */
function cloudSave(){
  if(FB.mode!=="cloud" || !FB.user) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER=setTimeout(function(){
    var f=window.__fb;
    f.setDoc(f.doc(f.db,"users",FB.user.uid),{
      logs: LOGS,
      updatedAt: new Date().toISOString(),
      email: FB.user.email || null
    }).catch(function(e){
      console.error(e);
      toast("Sauvegarde cloud échouée — gardée sur l'appareil");
    });
  },600);
}

function toast(msg){
  var old=document.querySelector(".toast"); if(old) old.remove();
  var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); },3200);
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function frDate(iso){ var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function isoWeek(d){ var date=new Date(d); date.setHours(0,0,0,0); date.setDate(date.getDate()+3-((date.getDay()+6)%7)); var w1=new Date(date.getFullYear(),0,4); return 1+Math.round(((date-w1)/86400000-3+((w1.getDay()+6)%7))/7); }

var STATE = { tab:"home", session:null, detail:null, progressSel:null };
var app = document.getElementById("app");
function go(patch){ Object.assign(STATE, patch); render(); }

function render(){
  // 1) Chargement de Firebase en cours → écran d'attente (jamais de page noire)
  if(FB.phase==="loading"){
    app.innerHTML=viewLoading();
    bindSignIn();
    return;
  }
  // 2) Firebase prêt mais personne n'est connecté → écran de connexion
  if(FB.phase==="ready" && FB.mode==="cloud" && !FB.user){
    app.innerHTML=viewSignIn();
    bindSignIn();
    return;
  }
  // 3) Mode normal (connecté, ou mode local)
  var html="";
  if(STATE.detail){ html=viewDetail(STATE.detail); }
  else if(STATE.session){ html=viewSession(STATE.session); }
  else if(STATE.tab==="home"){ html=viewHome(); }
  else if(STATE.tab==="progress"){ html=viewProgress(); }
  else if(STATE.tab==="guide"){ html=viewGuide(); }
  if(!STATE.session && !STATE.detail){ html+=tabbar(); }
  app.innerHTML=html;
  bind();
  window.scrollTo(0,0);
}

function tabbar(){
  var items=[["home","Séances","dumbbell"],["progress","Évolution","trend"],["guide","Exercices","book"]];
  var h="<nav class='tabbar'>";
  items.forEach(function(it){
    var on=STATE.tab===it[0];
    h+="<button class='tabbtn"+(on?" on":"")+"' data-tab='"+it[0]+"'>"+icon(it[2],22,on?C.lime:C.dim,on)+"<span>"+it[1]+"</span></button>";
  });
  return h+"</nav>";
}

function authBar(){

    }

  }
  var u=FB.user;
  var initial=(u.displayName||u.email||"?").charAt(0).toUpperCase();

    ? "<img class='avatar' src='"+u.photoURL+"' alt=''>"
    : "<div class='avatar' style='display:flex;align-items:center;justify-content:center;font-weight:700;color:"+C.lime+"'>"+initial+"</div>";

function bindSignIn(){

}

function historyList(ex){
  var entries=LOGS[ex.id]||[];
  var rev=entries.slice().reverse();
  var h="<div style='padding:0 15px 12px'>";
  rev.forEach(function(e,i){
    var realIdx=entries.length-1-i;
    h+="<div style='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:"+(i<rev.length-1?"1px solid "+C.line:"none")+"'><div style='font-size:12.5px'><span style='color:"+C.dim+"'>"+frDate(e.date)+"</span><span style='margin:0 6px;color:"+C.line+"'>·</span><b>"+formatEntry(e,ex.track)+"</b></div><button class='press' data-del='"+ex.id+":"+realIdx+"' style='background:none;border:none;color:"+C.dim+";padding:4px'>"+icon("trash",15,C.dim)+"</button></div>";
  });
  return h+"</div>";
}

function viewProgress(){
  var tracked=Object.keys(LOGS).filter(function(id){ return (LOGS[id]||[]).length>0 && ALL[id]; });
  var h="<div class='fade' style='padding:calc(24px + env(safe-area-inset-top)) 16px 8px'>";
  h+="<h1 style='margin:6px 0 4px'>Évolution</h1>";
  if(tracked.length===0){
    h+="<div style='margin-top:40px;text-align:center;color:"+C.dim+";padding:40px 20px;background:"+C.panel+";border-radius:18px;border:1px dashed "+C.line+"'><div style='display:flex;justify-content:center;margin-bottom:14px'>"+icon("trend",38,C.line)+"</div><div style='font-size:15px;font-weight:600;color:"+C.text+";margin-bottom:6px'>Pas encore de données</div><div style='font-size:13px;line-height:1.5'>Enregistre tes premières séances pour voir tes courbes de progression apparaître ici.</div></div></div>";
    return h;
  }
  if(!STATE.progressSel || tracked.indexOf(STATE.progressSel)<0){ STATE.progressSel=tracked[0]; }
  h+="<p style='color:"+C.dim+";font-size:13px;margin:0 0 16px'>Choisis un exercice pour voir ta progression semaine après semaine.</p>";
  h+="<div style='display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px'>";
  tracked.forEach(function(id){
    var e=ALL[id]; var on=STATE.progressSel===id;
    var nm=e.name.length>22?e.name.slice(0,20)+"…":e.name;
    h+="<button class='press' data-psel='"+id+"' style='white-space:nowrap;border:1px solid "+(on?e.sessionColor:C.line)+";background:"+(on?e.sessionColor:C.panel)+";color:"+(on?C.bg:C.dim)+";border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:700'>"+nm+"</button>";
  });
  h+="</div>";
  h+=chartBlock(STATE.progressSel);
  h+="</div>";
  return h;
}

function chartBlock(id){
  var ex=ALL[id]; var entries=LOGS[id]||[]; var track=ex.track;
  var vals=entries.map(function(e){ return track==="poids"?e.load:track==="elastique"?e.levelIdx:e.reps; });
  var yLabel=track==="poids"?"Charge (kg)":track==="elastique"?"Niveau élastique":"Durée (s)";
  var delta=vals.length>1?vals[vals.length-1]-vals[0]:0;
  var deltaColor=delta>0?C.lime:delta===0?C.dim:C.amber;
  var deltaTxt="";
  if(vals.length>1){
    if(track==="elastique") deltaTxt=delta>0?"↑ "+delta+" niveau(x) plus dur":delta<0?"↓ "+Math.abs(delta):"stable";
    else deltaTxt=delta>0?"↑ +"+delta+(track==="poids"?" kg":" s"):delta<0?"↓ "+delta:"stable";
  }
  var h="<div style='background:"+C.panel+";border:1px solid "+C.line+";border-radius:18px;padding:16px 12px 12px;margin-top:8px'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:baseline;padding:0 6px 10px'><div style='font-size:12px;color:"+C.dim+"'>"+yLabel+"</div>"+(deltaTxt?"<div style='font-size:13px;font-weight:700;color:"+deltaColor+"'>"+deltaTxt+"</div>":"")+"</div>";
  h+=svgChart(entries,track,ex.sessionColor);
  if(track==="elastique"){ h+="<div style='font-size:11px;color:"+C.dim+";padding:8px 8px 2px;line-height:1.4'>Plus la courbe monte, moins tu as besoin d'aide de l'élastique — donc tu te rapproches de la traction stricte.</div>"; }
  h+="</div>";
  h+=statRow(entries,track,ex.sessionColor);
  return h;
}

function svgChart(entries,track,color){
  var W=436, H=210, padL=34, padR=14, padT=14, padB=28;
  var vals=entries.map(function(e){ return track==="poids"?e.load:track==="elastique"?e.levelIdx:e.reps; });
  var n=vals.length;
  var minV, maxV;
  if(track==="elastique"){ minV=0; maxV=5; }
  else { minV=Math.min.apply(null,vals); maxV=Math.max.apply(null,vals); if(minV===maxV){ minV=Math.max(0,minV-2); maxV=maxV+2; } else { var pd=(maxV-minV)*0.15; minV=Math.max(0,minV-pd); maxV=maxV+pd; } }
  var plotW=W-padL-padR, plotH=H-padT-padB;
  function xOf(i){ return n<=1 ? padL+plotW/2 : padL + (plotW*i/(n-1)); }
  function yOf(v){ return padT + plotH*(1-(v-minV)/((maxV-minV)||1)); }
  var svg="<svg viewBox='0 0 "+W+" "+H+"' width='100%' style='display:block'>";
  var gridVals=[];
  if(track==="elastique"){ gridVals=[0,1,2,3,4,5]; }
  else { for(var gi=0;gi<=4;gi++){ gridVals.push(minV+(maxV-minV)*gi/4); } }
  gridVals.forEach(function(gv){
    var y=yOf(gv);
    svg+="<line x1='"+padL+"' y1='"+y+"' x2='"+(W-padR)+"' y2='"+y+"' stroke='"+C.line+"' stroke-width='1' stroke-dasharray='3 3'/>";
    var lbl=track==="elastique"?gv:(Math.round(gv*10)/10);
    svg+="<text x='"+(padL-6)+"' y='"+(y+4)+"' fill='"+C.dim+"' font-size='10' text-anchor='end'>"+lbl+"</text>";
  });
  if(n>=1){
    var d="";
    entries.forEach(function(e,i){ var x=xOf(i), y=yOf(vals[i]); d+=(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" "; });
    if(n>1){ svg+="<path d='"+d+"' fill='none' stroke='"+color+"' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>"; }
    entries.forEach(function(e,i){ var x=xOf(i), y=yOf(vals[i]); svg+="<circle cx='"+x.toFixed(1)+"' cy='"+y.toFixed(1)+"' r='4' fill='"+color+"'/>"; });
    var step=Math.ceil(n/6);
    entries.forEach(function(e,i){ if(i%step===0||i===n-1){ var x=xOf(i); svg+="<text x='"+x.toFixed(1)+"' y='"+(H-8)+"' fill='"+C.dim+"' font-size='10' text-anchor='middle'>"+frDate(e.date).slice(0,5)+"</text>"; } });
  }
  svg+="</svg>";
  return svg;
}

function statRow(entries,track,color){
  var weeks={}; entries.forEach(function(e){ weeks[e.week]=1; });
  var best;
  if(track==="poids") best=Math.max.apply(null,entries.map(function(e){return e.load;}))+" kg";
  else if(track==="elastique") best=ELASTIC_LEVELS[Math.max.apply(null,entries.map(function(e){return e.levelIdx;}))];
  else best=Math.max.apply(null,entries.map(function(e){return e.reps;}))+" s";
  var stats=[["Séances",entries.length],["Semaines",Object.keys(weeks).length],[track==="elastique"?"Meilleur niveau":"Record",best]];
  var h="<div style='display:flex;gap:10px;margin-top:14px'>";
  stats.forEach(function(st){
    var big=!(track==="elastique" && String(st[0]).indexOf("niveau")>=0);
    h+="<div style='flex:1;background:"+C.panel+";border:1px solid "+C.line+";border-radius:14px;padding:13px 8px;text-align:center'><div style='font-size:"+(big?20:12)+"px;font-weight:800;color:"+color+"'>"+st[1]+"</div><div style='font-size:10.5px;color:"+C.dim+";text-transform:uppercase;letter-spacing:.5px;margin-top:3px'>"+st[0]+"</div></div>";
  });
  return h+"</div>";
}

function viewGuide(){
  var h="<div class='fade' style='padding:calc(24px + env(safe-area-inset-top)) 16px 8px'>";
  h+="<h1 style='margin:6px 0 4px'>Exercices</h1><p style='color:"+C.dim+";font-size:13px;margin:0 0 18px'>La fiche technique de chaque mouvement : comment bien faire, et les erreurs à éviter pour ne pas te blesser.</p>";
  Object.keys(PROGRAM).forEach(function(k){
    var s=PROGRAM[k];
    h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:10px'><div style='width:4px;height:18px;background:"+s.color+";border-radius:4px'></div><span style='font-weight:800;font-size:15px'>"+s.name+"</span><span style='color:"+C.dim+";font-size:12px'>· "+s.day+"</span></div>";
    s.exercises.forEach(function(ex){
      h+="<button class='press' data-detail='"+ex.id+"' style='width:100%;text-align:left;background:"+C.panel+";border:1px solid "+C.line+";border-radius:14px;padding:11px 13px;margin-bottom:9px;color:"+C.text+";display:flex;align-items:center;gap:12px'>";
      h+="<div style='width:50px;height:38px;background:"+C.panel2+";border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid "+C.line+"'><div style='width:42px;height:30px'>"+figure(ex.fig)+"</div></div>";
      h+="<div style='flex:1;min-width:0'><div style='font-weight:700;font-size:13.5px;line-height:1.25'>"+ex.name+"</div><div style='color:"+C.dim+";font-size:11.5px;margin-top:2px'>"+ex.target+" · "+ex.sets+"×"+ex.reps+"</div></div>";
      h+="<div style='transform:rotate(180deg);flex-shrink:0'>"+icon("back",17,C.dim)+"</div></button>";
    });
    h+="</div>";
  });
  return h+"</div>";
}

function viewDetail(id){
  var ex=ALL[id]; if(!ex) return "";
  var color=ex.sessionColor||C.lime; var meta=TRACK_LABEL[ex.track];
  var entries=LOGS[id]||[];
  var h="<div class='fade'>"+header(color,ex.name,ex.target+" · "+ex.sets+" × "+ex.reps+" · repos "+ex.rest);
  h+="<div style='padding:16px 16px 26px'>";
  h+="<div style='background:"+C.panel+";border:1px solid "+C.line+";border-radius:18px;padding:18px;margin-bottom:18px;display:flex;justify-content:center'><div style='width:72%;max-width:230px;aspect-ratio:5/3'>"+figure(ex.fig)+"</div></div>";
  h+="<div style='display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap'><span class='chip'>"+ex.sets+" séries</span><span class='chip'>"+ex.reps+" reps</span><span class='chip'>Repos "+ex.rest+"</span><span class='chip' style='color:"+meta.tint+"'>"+meta.label+"</span></div>";
  h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:12px'>"+icon("checkcircle",19,C.lime)+"<h3 style='margin:0;font-size:16px;font-weight:800'>Comment bien faire</h3></div><ul style='margin:0;padding:0;list-style:none'>";
  ex.how.forEach(function(t,i){ h+="<li style='margin-bottom:9px;line-height:1.5;font-size:14px'><span style='color:"+C.lime+";font-weight:700;margin-right:6px'>"+(i+1)+".</span>"+t+"</li>"; });
  h+="</ul></div>";
  h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:12px'>"+icon("warn",19,C.red)+"<h3 style='margin:0;font-size:16px;font-weight:800'>Erreurs à éviter (sécurité)</h3></div><ul style='margin:0;padding:0;list-style:none'>";
  ex.avoid.forEach(function(t){ h+="<li style='margin-bottom:9px;line-height:1.5;font-size:14px;display:flex;gap:8px'><span style='color:"+C.red+";flex-shrink:0;margin-top:1px'>✕</span>"+t+"</li>"; });
  h+="</ul></div>";
  if(entries.length>0){ var l=entries[entries.length-1]; h+="<div style='background:"+C.panel2+";border:1px solid "+C.line+";border-radius:14px;padding:14px'><div style='font-size:12px;color:"+C.dim+";margin-bottom:6px;font-weight:600'>Ta dernière performance</div><div style='font-size:16px;font-weight:700;color:"+color+"'>"+formatEntry(l,ex.track)+"<span style='color:"+C.dim+";font-weight:400;font-size:12px;margin-left:8px'>le "+frDate(l.date)+"</span></div></div>"; }
  h+="</div></div>";
  return h;
}

var OPEN_FORM=null;
var OPEN_HIST={};
var FORM_LEVEL={};

function bind(){
  app.querySelectorAll("[data-signout]").forEach(function(b){ b.onclick=function(){ fbSignOut(); }; });
  app.querySelectorAll("[data-tab]").forEach(function(b){ b.onclick=function(){ go({tab:b.getAttribute("data-tab"), session:null, detail:null}); }; });
  app.querySelectorAll("[data-back]").forEach(function(b){ b.onclick=function(){ OPEN_FORM=null; go({session:null, detail:null}); }; });
  app.querySelectorAll("[data-session]").forEach(function(b){ b.onclick=function(){ OPEN_FORM=null; OPEN_HIST={}; go({session:b.getAttribute("data-session")}); }; });
  app.querySelectorAll("[data-detail]").forEach(function(b){ b.onclick=function(){ go({detail:b.getAttribute("data-detail")}); }; });
  app.querySelectorAll("[data-psel]").forEach(function(b){ b.onclick=function(){ STATE.progressSel=b.getAttribute("data-psel"); render(); }; });
  app.querySelectorAll("[data-toggle]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-toggle"); OPEN_FORM=(OPEN_FORM===id)?null:id; refreshCard(id); }; });
  app.querySelectorAll("[data-hist]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-hist"); OPEN_HIST[id]=!OPEN_HIST[id]; refreshCard(id); }; });
  bindCardInner();
}

function bindCardInner(){
  app.querySelectorAll("[data-levels]").forEach(function(zone){
    zone.querySelectorAll("[data-level]").forEach(function(pill){
      pill.onclick=function(){
        var form=zone.closest("[data-form]"); var id=form.getAttribute("data-form");
        FORM_LEVEL[id]=parseInt(pill.getAttribute("data-level"),10);
        var color=ALL[id].sessionColor;
        zone.querySelectorAll("[data-level]").forEach(function(x){ x.style.borderColor=""; x.style.background=""; x.style.color=""; });
        pill.style.borderColor=color; pill.style.background=color; pill.style.color=C.bg;
      };
    });
  });
  app.querySelectorAll("[data-save]").forEach(function(b){ b.onclick=function(){ saveEntry(b.getAttribute("data-save")); }; });
  app.querySelectorAll("[data-del]").forEach(function(b){
    b.onclick=function(){
      var parts=b.getAttribute("data-del").split(":"); var id=parts[0]; var idx=parseInt(parts[1],10);
      (LOGS[id]||[]).splice(idx,1); if(LOGS[id] && LOGS[id].length===0){ delete LOGS[id]; }
      saveLogs(); refreshCard(id);
    };
  });
}

function refreshCard(id){
  var card=app.querySelector("[data-card='"+id+"']");
  if(!card){ render(); return; }
  var ex=ALL[id]; var k=ex.sessionKey; var color=ex.sessionColor;
  var fz=card.querySelector("[data-form='"+id+"']");
  if(OPEN_FORM===id){ fz.classList.remove("hidden"); fz.innerHTML=entryForm(ex,k,color); if(FORM_LEVEL[id]==null) FORM_LEVEL[id]=2; }
  else { fz.classList.add("hidden"); fz.innerHTML=""; }
  var tog=card.querySelector("[data-toggle='"+id+"']");
  if(tog){ tog.innerHTML=(OPEN_FORM===id?icon("x",15,C.lime):icon("plus",15,color))+(OPEN_FORM===id?" Fermer":" Noter"); tog.style.color=OPEN_FORM===id?C.lime:color; tog.style.background=OPEN_FORM===id?C.panel2:"none"; }
  var hz=card.querySelector("[data-histzone='"+id+"']");
  if(hz){ if(OPEN_HIST[id]){ hz.classList.remove("hidden"); hz.innerHTML=historyList(ex); } else { hz.classList.add("hidden"); hz.innerHTML=""; } }
  var hb=card.querySelector("[data-hist='"+id+"']");
  if(hb){ hb.textContent="Historique ("+((LOGS[id]||[]).length)+")"; }
  bindCardInner();
}

function saveEntry(id){
  var ex=ALL[id]; var k=ex.sessionKey;
  var card=app.querySelector("[data-card='"+id+"']");
  var fz=card.querySelector("[data-form='"+id+"']");
  var base={date:todayStr(), session:k, week:isoWeek(todayStr())};
  var entry=null;
  if(ex.track==="poids"){
    var load=fz.querySelector("[data-load]").value;
    var reps=fz.querySelector("[data-reps]").value;
    if(load==="" || reps===""){ return; }
    entry=Object.assign(base,{load:Number(load), reps:Number(reps)});
  } else if(ex.track==="elastique"){
    var reps2=fz.querySelector("[data-reps]").value;
    if(reps2===""){ return; }
    var lvl=FORM_LEVEL[id]!=null?FORM_LEVEL[id]:2;
    entry=Object.assign(base,{level:ELASTIC_LEVELS[lvl], levelIdx:lvl, reps:Number(reps2)});
  } else {
    var reps3=fz.querySelector("[data-reps]").value;
    if(reps3===""){ return; }
    entry=Object.assign(base,{reps:Number(reps3)});
  }
  if(!LOGS[id]) LOGS[id]=[];
  LOGS[id].push(entry);
  saveLogs();
  OPEN_FORM=null;
  card.outerHTML=exerciseCard(ex,k,ex.sessionColor);
  bind();
}

/* ============================================================
   DÉMARRAGE
   ============================================================ */
function boot(){
  LOGS = loadLogs();

  // Pas de config Firebase → mode local pur, accès direct à l'app
  if(!isConfigured()){
    FB.mode="local"; FB.phase="done";
    render();
    return;
  }

  // Config présente → phase de chargement (écran d'attente, jamais de noir)
  FB.phase="loading";
  render();

  initFirebase().then(function(ok){
    if(!ok){
      FB.mode="local"; FB.phase="done";
      LOGS=loadLogs();
      render();
      toast("Hors ligne : données gardées sur cet appareil");
      return;
    }
    FB.phase="ready";
    var f=window.__fb;
    // Récupère le résultat d'une éventuelle connexion par redirection (mobile)
    f.getRedirectResult(f.auth).catch(function(){});
    f.onAuthStateChanged(f.auth, function(user){
      if(user){
        FB.user=user;
        cloudLoad(user.uid).then(function(cloud){
          var local=loadLogs();
          var localCount=Object.keys(local).length;
          if(cloud===null){
            // Compte neuf
            if(localCount>0){
              LOGS=local; saveLogs();
              toast("Tes données de cet appareil ont été importées");
            } else { LOGS={}; }
          } else {
            LOGS=cloud;
            if(localCount>0 && Object.keys(cloud).length===0){
              LOGS=local; saveLogs();
              toast("Tes données locales ont été importées");
            }
          }
          try{ localStorage.setItem(LS_KEY, JSON.stringify(LOGS)); }catch(e){}
          FB.phase="done";
          render();
        }).catch(function(e){
          console.error(e);
          toast("Lecture cloud impossible — mode local");
          FB.mode="local"; FB.phase="done"; LOGS=loadLogs(); render();
        });
      } else {
        FB.user=null;
        if(FB.mode==="cloud"){ FB.phase="ready"; }
        render();
      }
    });
  });
}

boot();
</script>
